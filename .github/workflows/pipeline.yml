name: Advanced-SDLC-Pipeline
on: [push, pull_request]

jobs:
  Quality-Audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Linting & Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

      - name: Run Static Analysis (Linting)
        run: |
          # Checks for syntax errors and PEP8 compliance
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Security Scan (SAST)
        run: |
          # Scans for security vulnerabilities in the source code
          bandit -r src/

  Unit-Testing:
    needs: Quality-Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Execute Automated Tests
        run: |
          # Setting PYTHONPATH so pytest can find the 'src' folder
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/
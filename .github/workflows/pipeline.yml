name: Advanced-SDLC-Pipeline

on: [push, pull_request]

jobs:
  Quality-Audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Linting & Security Tools
        run: |
          pip install flake8 bandit

      - name: Run Static Analysis (Linting)
        run: |
          # Checks for syntax errors and PEP8 compliance
          flake8 src/ --count --max-line-length=120 --ignore=E302,W292 --statistics

      - name: Run Security Scan (SAST)
        run: |
          bandit -r src/

  Unit-Testing:
    needs: Quality-Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Testing Dependencies
        run: |
          pip install pytest

      - name: Execute Automated Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/
